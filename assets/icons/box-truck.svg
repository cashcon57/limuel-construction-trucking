<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 62 44" fill="none" stroke="#E0B44E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Cab body -->
  <rect x="2" y="12" width="14" height="16" rx="2"/>
  <!-- Windshield -->
  <rect x="4.5" y="14.5" width="9" height="6" rx="1" fill="#E0B44E" opacity="0.15"/>
  <!-- Windshield divider -->
  <line x1="9" y1="14.5" x2="9" y2="20.5" opacity="0.3"/>
  <!-- Side mirror -->
  <line x1="2" y1="15" x2="0" y2="14"/>
  <line x1="0" y1="13" x2="0" y2="16" stroke-width="1.5"/>
  <!-- Cab step -->
  <line x1="2" y1="26" x2="5" y2="26" opacity="0.5"/>
  <!-- Headlight -->
  <rect x="2.5" y="22" width="2" height="1.5" rx="0.5" fill="#E0B44E" opacity="0.3"/>
  <!-- Box body -->
  <rect x="16" y="4" width="42" height="24" rx="2"/>
  <!-- Box body fill -->
  <rect x="16" y="4" width="42" height="24" rx="2" fill="#E0B44E" opacity="0.04"/>
  <!-- Roll-up door -->
  <line x1="54" y1="8" x2="54" y2="28" opacity="0.35"/>
  <!-- Door handle -->
  <line x1="56.5" y1="17" x2="56.5" y2="22"/>
  <!-- Door latch -->
  <circle cx="56.5" cy="16" r="0.7" fill="#E0B44E" opacity="0.3"/>
  <!-- Horizontal panel lines -->
  <line x1="20" y1="11" x2="54" y2="11" opacity="0.1"/>
  <line x1="20" y1="18" x2="54" y2="18" opacity="0.1"/>
  <!-- Side logo area hint -->
  <rect x="28" y="12" width="16" height="5" rx="1" opacity="0.08" fill="#E0B44E"/>
  <!-- Rivet row top -->
  <circle cx="22" cy="6" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <circle cx="30" cy="6" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <circle cx="38" cy="6" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <circle cx="46" cy="6" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <!-- Rivet row bottom -->
  <circle cx="22" cy="26" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <circle cx="30" cy="26" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <circle cx="38" cy="26" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <circle cx="46" cy="26" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <!-- Rear bumper -->
  <line x1="57" y1="24" x2="59" y2="24" opacity="0.4"/>
  <line x1="57" y1="27" x2="59" y2="27" opacity="0.4"/>
  <!-- Undercarriage -->
  <line x1="16" y1="28" x2="58" y2="28" opacity="0.3"/>
  <!-- Rear mud flap -->
  <line x1="56" y1="28" x2="56" y2="32" opacity="0.3"/>
  <!-- Front steer wheel -->
  <circle cx="10" cy="33" r="4.5"/>
  <circle cx="10" cy="33" r="1.8"/>
  <circle cx="10" cy="33" r="3.2" opacity="0.12"/>
  <!-- Rear wheel -->
  <circle cx="46" cy="33" r="4.5"/>
  <circle cx="46" cy="33" r="1.8"/>
  <circle cx="46" cy="33" r="3.2" opacity="0.12"/>
</svg>
