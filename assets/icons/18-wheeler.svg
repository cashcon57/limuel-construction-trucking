<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 44" fill="none" stroke="#E0B44E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Cab body -->
  <rect x="2" y="10" width="15" height="18" rx="2"/>
  <!-- Windshield -->
  <rect x="4.5" y="12.5" width="10" height="7" rx="1" fill="#E0B44E" opacity="0.15"/>
  <!-- Windshield divider -->
  <line x1="9.5" y1="12.5" x2="9.5" y2="19.5" opacity="0.3"/>
  <!-- Side mirror -->
  <line x1="2" y1="13" x2="0" y2="12"/>
  <line x1="0" y1="11" x2="0" y2="14" stroke-width="1.5"/>
  <!-- Cab roof visor -->
  <line x1="3" y1="10" x2="16" y2="10" stroke-width="3" opacity="0.2"/>
  <!-- Cab step -->
  <line x1="2" y1="26" x2="5" y2="26" opacity="0.5"/>
  <line x1="2" y1="24" x2="5" y2="24" opacity="0.5"/>
  <!-- Fuel tank -->
  <rect x="5" y="22" width="8" height="4" rx="1" opacity="0.35" fill="#E0B44E"/>
  <!-- Cab-trailer gap -->
  <line x1="17" y1="14" x2="17" y2="28" opacity="0.15"/>
  <!-- Trailer -->
  <rect x="18" y="2" width="59" height="26" rx="2"/>
  <!-- Trailer panel seams -->
  <line x1="38" y1="2" x2="38" y2="28" opacity="0.1"/>
  <line x1="57" y1="2" x2="57" y2="28" opacity="0.1"/>
  <!-- Trailer rivet row top -->
  <circle cx="25" cy="4.5" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <circle cx="32" cy="4.5" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <circle cx="45" cy="4.5" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <circle cx="52" cy="4.5" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <circle cx="63" cy="4.5" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <circle cx="70" cy="4.5" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <!-- Trailer rivet row bottom -->
  <circle cx="25" cy="25.5" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <circle cx="32" cy="25.5" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <circle cx="45" cy="25.5" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <circle cx="52" cy="25.5" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <circle cx="63" cy="25.5" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <circle cx="70" cy="25.5" r="0.5" fill="#E0B44E" opacity="0.2"/>
  <!-- Rear door lines -->
  <line x1="75" y1="6" x2="75" y2="28" opacity="0.25"/>
  <line x1="73" y1="16" x2="75" y2="16" opacity="0.3"/>
  <!-- Rear bumper -->
  <line x1="77" y1="22" x2="78.5" y2="22" opacity="0.4"/>
  <line x1="77" y1="26" x2="78.5" y2="26" opacity="0.4"/>
  <!-- Mud flap behind cab -->
  <line x1="18" y1="28" x2="18" y2="31" opacity="0.3"/>
  <!-- Undercarriage rail -->
  <line x1="18" y1="28" x2="77" y2="28" opacity="0.3"/>
  <!-- Fifth wheel coupling -->
  <path d="M16 28 Q17 30 18 28" opacity="0.4" stroke-width="1.5"/>
  <!-- Exhaust stack -->
  <line x1="6" y1="10" x2="6" y2="2"/>
  <circle cx="6" cy="1.5" r="1.4" fill="#E0B44E" opacity="0.2"/>
  <!-- Smoke puffs -->
  <circle cx="6" cy="-1" r="0.8" opacity="0.12" fill="#E0B44E"/>
  <circle cx="8" cy="-1.5" r="0.6" opacity="0.08" fill="#E0B44E"/>
  <!-- Front steer wheel -->
  <circle cx="11" cy="33" r="4.5"/>
  <circle cx="11" cy="33" r="1.8"/>
  <!-- Steer wheel tread -->
  <circle cx="11" cy="33" r="3.2" opacity="0.12"/>
  <!-- Cab rear tandem -->
  <circle cx="24" cy="33" r="3.5"/>
  <circle cx="24" cy="33" r="1.4"/>
  <circle cx="32" cy="33" r="3.5"/>
  <circle cx="32" cy="33" r="1.4"/>
  <!-- Tandem axle bar -->
  <line x1="24" y1="37" x2="32" y2="37" opacity="0.25" stroke-width="1.5"/>
  <!-- Trailer rear tandem -->
  <circle cx="58" cy="33" r="3.5"/>
  <circle cx="58" cy="33" r="1.4"/>
  <circle cx="66" cy="33" r="3.5"/>
  <circle cx="66" cy="33" r="1.4"/>
  <!-- Tandem axle bar -->
  <line x1="58" y1="37" x2="66" y2="37" opacity="0.25" stroke-width="1.5"/>
  <!-- Rear mud flap -->
  <line x1="70" y1="28" x2="70" y2="32" opacity="0.3"/>
</svg>
