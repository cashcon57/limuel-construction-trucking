<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 68 44" fill="none" stroke="#E0B44E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Cab body -->
  <rect x="2" y="12" width="14" height="16" rx="2"/>
  <!-- Windshield -->
  <rect x="4.5" y="14.5" width="9" height="6" rx="1" fill="#E0B44E" opacity="0.15"/>
  <!-- Windshield divider -->
  <line x1="9" y1="14.5" x2="9" y2="20.5" opacity="0.3"/>
  <!-- Side mirror -->
  <line x1="2" y1="15" x2="0" y2="14"/>
  <line x1="0" y1="13" x2="0" y2="16" stroke-width="1.5"/>
  <!-- Cab step -->
  <line x1="2" y1="26" x2="5" y2="26" opacity="0.5"/>
  <!-- Headlight -->
  <rect x="2.5" y="22" width="2" height="1.5" rx="0.5" fill="#E0B44E" opacity="0.3"/>
  <!-- Drum -->
  <ellipse cx="38" cy="16" rx="18" ry="12" transform="rotate(-12 38 16)"/>
  <ellipse cx="38" cy="16" rx="11" ry="7" transform="rotate(-12 38 16)" opacity="0.12" fill="#E0B44E"/>
  <!-- Drum stripes -->
  <path d="M25 10 Q38 6 51 10" opacity="0.2"/>
  <path d="M23 16 Q38 12 53 16" opacity="0.2"/>
  <path d="M25 22 Q38 18 51 22" opacity="0.2"/>
  <!-- Drum rotation axis -->
  <line x1="20" y1="20" x2="54" y2="10" opacity="0.08" stroke-width="1"/>
  <!-- Drum mounting bracket -->
  <path d="M20 26 L22 18" opacity="0.3" stroke-width="1.5"/>
  <path d="M52 26 L50 14" opacity="0.3" stroke-width="1.5"/>
  <!-- Chute -->
  <line x1="54" y1="8" x2="63" y2="2"/>
  <line x1="54" y1="11" x2="63" y2="5"/>
  <!-- Chute end -->
  <line x1="63" y1="2" x2="63" y2="5"/>
  <!-- Water tank -->
  <rect x="16" y="22" width="6" height="5" rx="1" opacity="0.3" fill="#E0B44E"/>
  <rect x="16" y="22" width="6" height="5" rx="1" opacity="0.3"/>
  <!-- Frame -->
  <line x1="16" y1="28" x2="60" y2="28" opacity="0.3"/>
  <!-- Exhaust stack -->
  <line x1="6" y1="12" x2="6" y2="4"/>
  <circle cx="6" cy="3" r="1.4" fill="#E0B44E" opacity="0.2"/>
  <!-- Smoke puffs -->
  <circle cx="6" cy="0.5" r="0.8" opacity="0.12" fill="#E0B44E"/>
  <!-- Front steer wheel -->
  <circle cx="10" cy="33" r="4.5"/>
  <circle cx="10" cy="33" r="1.8"/>
  <circle cx="10" cy="33" r="3.2" opacity="0.12"/>
  <!-- Rear tandem -->
  <circle cx="40" cy="33" r="3.5"/>
  <circle cx="40" cy="33" r="1.4"/>
  <circle cx="52" cy="33" r="3.5"/>
  <circle cx="52" cy="33" r="1.4"/>
  <!-- Tandem axle bar -->
  <line x1="40" y1="37" x2="52" y2="37" opacity="0.25" stroke-width="1.5"/>
  <!-- Mud flap -->
  <line x1="56" y1="28" x2="56" y2="32" opacity="0.3"/>
</svg>
